name: Bug Report
description: Report a bug in elnora-google-workspace
title: "[Bug]: "
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: Plugin / CLI Version
      description: "Run `gw --version` to find your version."
      placeholder: "1.0.0"
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python Version
      description: "Run `python --version` to find your version."
      placeholder: "3.12.0"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux
        - Windows
        - Other
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Where did you hit this?
      options:
        - Claude Code (slash command or skill)
        - Standalone CLI (gw)
        - Both
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the bug.
      placeholder: |
        1. Run `gw gmail list ...`
        2. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: |
        Any relevant error messages or logs.
        **Important:** Please redact any OAuth tokens, API keys, email addresses, or personal data before pasting.
      render: shell
    validations:
      required: false
