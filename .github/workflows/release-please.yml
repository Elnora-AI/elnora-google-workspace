name: Release Please

# Maintains a rolling "release PR" from Conventional Commits on main. Merging that PR
# bumps the version (package.json + .claude-plugin/plugin.json + .claude-plugin/marketplace.json
# via release-please-config.json extra-files), updates CHANGELOG.md, tags the release, and
# publishes a GitHub Release. This repo ships no package (nothing to npm/PyPI), so the GitHub
# Release is the end of the line — there is deliberately no release.yml.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v5
        with:
          # Org PAT so the release PR it opens re-triggers CI; the built-in
          # GITHUB_TOKEN cannot (PRs it opens would skip required checks).
          token: ${{ secrets.RELEASE_BOT_PAT }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
